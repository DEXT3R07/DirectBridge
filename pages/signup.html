<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Direct Bridge</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="../index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-bridge"></i></div>
                <span>Direct</span><span>Bridge</span>
            </a>
            <div class="nav-actions">
                <a href="cart.html" class="nav-btn">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="cart-badge">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="form-container">
        <div class="form-card fade-in">
            <h2>Create Account</h2>
            <p class="subtitle">Join Direct Bridge today</p>
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="signup-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email address *</label>
                    <input type="email" id="signup-email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="signup-phone" required placeholder="+234 800 000 0000">
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="signup-password" required placeholder="Min 4 characters">
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="signup-confirm" required placeholder="Confirm password">
                </div>
                <button type="submit" class="form-submit">Create Account</button>
            </form>
            <p class="form-footer">
                Already have an account? <a href="login.html" id="login-link">Log in</a>
            </p>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Item added to cart</span>
    </div>

    <script src="../js/main.js"></script>
    <script>
        // Preserve redirect parameter in login link
        document.addEventListener('DOMContentLoaded', () => {
            const redirect = getUrlParam('redirect');
            if (redirect) {
                const loginLink = document.getElementById('login-link');
                if (loginLink) {
                    loginLink.href = 'login.html?redirect=' + encodeURIComponent(redirect);
                }
            }
        });
    </script>
</body>
</html>
