<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Direct Bridge</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="../index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-bridge"></i></div>
                <span>Direct</span><span>Bridge</span>
            </a>
            <div class="nav-actions">
                <a href="cart.html" class="nav-btn">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="cart-badge">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="form-container">
        <div class="form-card fade-in">
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to your account</p>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="login-email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="Password">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--ash-600); cursor: pointer;">
                        <input type="checkbox" style="width: auto;"> Remember me
                    </label>
                    <a href="#" style="font-size: 0.875rem; color: var(--ash-600);">Forgot password?</a>
                </div>
                <button type="submit" class="form-submit">Sign in</button>
            </form>
            <p class="form-footer">
                Don't have an account? <a href="signup.html" id="signup-link">Sign up</a>
            </p>
            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--ash-200); text-align: center;">
                <p style="font-size: 0.75rem; color: var(--ash-400);">Admin login: admin@directbridge.com / any password</p>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Item added to cart</span>
    </div>

    <script src="../js/main.js"></script>
    <script>
        // Preserve redirect parameter in signup link
        document.addEventListener('DOMContentLoaded', () => {
            const redirect = getUrlParam('redirect');
            if (redirect) {
                const signupLink = document.getElementById('signup-link');
                if (signupLink) {
                    signupLink.href = 'signup.html?redirect=' + encodeURIComponent(redirect);
                }
            }
        });
    </script>
</body>
</html>
